<!DOCTYPE html>

<meta charset="UTF-8">

<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#0A0A12;
    color:#F0F0F5;
    font-family:'DM Sans',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    text-align:center;
    padding:24px;
    font-size:16px;
  }
  .logo{margin-bottom:32px;}
  .logo .ai{font-style:italic;font-size:36px;font-weight:900;color:#FFD54F;}
  .logo .alysis{font-size:36px;font-weight:900;color:white;}
  .error-code{
    font-size:120px;
    font-weight:900;
    background:linear-gradient(135deg,#4A3AFF,#7C6FFF);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    line-height:1;
    margin-bottom:16px;
  }
  .error-title{
    font-size:24px;
    font-weight:700;
    color:#F0F0F5;
    margin-bottom:12px;
  }
  .error-desc{
    font-size:14px;
    color:#7A7A95;
    max-width:400px;
    line-height:1.6;
    margin-bottom:32px;
  }
  .home-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:linear-gradient(135deg,#4A3AFF,#7C6FFF);
    color:white;
    text-decoration:none;
    padding:14px 28px;
    border-radius:12px;
    font-size:15px;
    font-weight:700;
    transition:transform .2s, box-shadow .2s;
  }
  .home-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 24px rgba(74,58,255,.3);
  }
  .home-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;}
  .footer-text{
    position:fixed;
    bottom:24px;
    font-size:12px;
    color:#7A7A95;
  }
</style>
</head>
<body>
  <div class="logo">
    <span class="ai">ai</span><span class="alysis">ALYSIS</span>
  </div>
  <div class="error-code">404</div>
  <h2 class="error-title">Sayfa Bulunamadi</h2>
  <p class="error-desc">Aradiginiz sayfa tasinmis, kaldirilmis veya hic var olmamis olabilir. Ana sayfaya donerek maclarla devam edebilirsiniz.</p>
  <a href="/" class="home-btn" title="aiALYSIS Live Ana Sayfa">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Ana Sayfaya Don
  </a>
  <p class="footer-text">&copy; 2026 aiALYSIS Live</p>
