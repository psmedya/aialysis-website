<style>
:root{
  --bg:#0A0A12;--surface:#12121E;--card:#1A1A2E;--border:#2A2A3E;
  --blue:#4A3AFF;--blue-lt:#7C6FFF;--green:#2ED573;--orange:#FF7F50;
  --red:#FF4757;--yellow:#FFD32A;--text:#F0F0F5;--muted:#7A7A95;
  --gold:#D4A24C;--gold-lt:#FFD54F;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{overflow-x:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
a{color:var(--blue-lt);text-decoration:none;}
a:hover{text-decoration:underline;}

.navbar{
  background:var(--blue);display:flex;align-items:center;gap:16px;
  padding:0 24px;height:60px;position:sticky;top:0;z-index:500;
  border-bottom:1px solid rgba(255,255,255,.1);
}
.nav-logo{display:flex;align-items:baseline;gap:0;}
.nav-logo .ai{font-style:italic;font-size:20px;font-weight:300;color:var(--gold-lt);}
.nav-logo .alysis{font-size:20px;font-weight:900;color:white;letter-spacing:-1px;}
.nav-back{margin-left:16px;background:rgba(255,255,255,.1);border:none;color:white;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s;text-decoration:none;}
.nav-back:hover{background:rgba(255,255,255,.2);}

.container{max-width:900px;margin:0 auto;padding:40px 20px;}
h1{font-size:32px;font-weight:900;margin-bottom:8px;color:var(--gold-lt);}
.subtitle{color:var(--muted);font-size:15px;margin-bottom:20px;}

.blog-filters{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.blog-filter-btn{padding:6px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.blog-filter-btn:hover,.blog-filter-btn.active{background:var(--blue);border-color:var(--blue);color:white;}

.blog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;}

.article-card{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:28px 32px;transition:all .2s;cursor:pointer;
}
.article-card:hover{border-color:var(--gold);transform:translateY(-2px);}
.article-meta{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.article-date{color:var(--muted);font-size:12px;}
.article-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.tag-ai{background:rgba(74,58,255,.15);color:var(--blue-lt);border:1px solid rgba(74,58,255,.3);}
.tag-analiz{background:rgba(46,213,115,.15);color:var(--green);border:1px solid rgba(46,213,115,.3);}
.tag-rehber{background:rgba(255,127,80,.15);color:var(--orange);border:1px solid rgba(255,127,80,.3);}
.tag-default{background:rgba(212,162,76,.15);color:var(--gold-lt);border:1px solid rgba(212,162,76,.3);}
.article-card h2{font-size:20px;font-weight:700;margin-bottom:10px;color:white;}
.article-card p{color:var(--muted);font-size:14px;line-height:1.7;}

/* Detay Gorunumu */
.blog-detail{max-width:700px;margin:0 auto;}
.blog-detail-back{display:inline-flex;align-items:center;gap:6px;color:var(--blue-lt);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:20px;padding:6px 12px;border-radius:6px;transition:all .2s;}
.blog-detail-back:hover{background:rgba(74,58,255,.1);}
.blog-detail h1{font-size:28px;margin-bottom:12px;color:white;}
.blog-detail-meta{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
.blog-detail-body{font-size:15px;color:var(--muted);line-height:1.8;}
.blog-detail-body h3{font-size:18px;font-weight:700;color:var(--gold);margin:24px 0 10px;}
.blog-detail-body p{margin-bottom:14px;}
.blog-detail-body ul{padding-left:20px;margin:10px 0;}
.blog-detail-body li{margin-bottom:6px;}
.blog-detail-body .highlight{background:var(--surface);border-left:3px solid var(--blue);padding:14px 18px;border-radius:0 8px 8px 0;margin:16px 0;font-size:14px;color:var(--text);line-height:1.6;}

.loading{text-align:center;padding:40px;color:var(--muted);}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--blue-lt);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .blog-grid{grid-template-columns:1fr;}
  .article-card{padding:20px;}
  h1{font-size:24px;}
  .container{padding:20px 12px;}
  .navbar{padding:0 12px;height:50px;}
  .nav-back{padding:6px 12px;font-size:12px;margin-left:8px;}
  .blog-detail h1{font-size:22px;}
  .blog-detail-body{font-size:14px;}
  .blog-filter-btn{padding:5px 12px;font-size:11px;}
}

footer{background:var(--surface);border-top:1px solid var(--border);padding:24px 20px;text-align:center;font-size:11px;color:var(--muted);line-height:1.8;margin-top:60px;}
</style>

<nav class="navbar">
  <a href="/" class="nav-logo"><span class="ai">ai</span><span class="alysis">ALYSIS</span></a>
  <a href="/" class="nav-back">Ana Sayfa</a>
  <a href="/blog.html" class="nav-back" style="margin-left:0;">Blog</a>
</nav>

<div class="container" id="blogContainer">
  <div class="loading"><div class="spinner"></div>Yazilar yukleniyor...</div>
</div>

<footer>
  <p style="margin-bottom:8px;"><a href="/" style="color:var(--gold);font-weight:700;">aiALYSIS Live</a> &mdash; Yapay Zeka Destekli Futbol Analizi</p>
  <p><a href="/privacy.html">Gizlilik</a> &middot; <a href="/terms.html">Kullanim Sartlari</a> &middot; <a href="/blog.html" style="color:var(--gold);">Blog</a></p>
  <p style="margin-top:8px;font-size:10px;">&copy; 2026 aiALYSIS Live. Tum haklari saklidir.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SU='https://fohmlwoewjupceznwmdr.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZvaG1sd29ld2p1cGNlem53bWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDE4MjYsImV4cCI6MjA4OTUxNzgyNn0.Ye-85hcsrLeORp-ThZCxssrc92WOm4ZI-B3mvTmwju4';

let tumYazilar=[];
let aktifLigFiltre='hepsi';

function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}

function tagClass(etiket){
  const e=(etiket||'').toLowerCase();
  if(e.includes('ai')||e.includes('yapay'))return 'tag-ai';
  if(e.includes('analiz')||e.includes('sezon'))return 'tag-analiz';
  if(e.includes('rehber')||e.includes('istatistik'))return 'tag-rehber';
  return 'tag-default';
}

function renderYaziListesi(yazilar){
  const c=document.getElementById('blogContainer');
  // Lig filtre listesi
  const ligler=[...new Set(yazilar.map(y=>y.lig).filter(Boolean))].sort();

  c.innerHTML=`
    <h1>Blog</h1>
    <p class="subtitle">Futbol analizi, yapay zeka tahminleri ve istatistik rehberleri</p>
    ${ligler.length>0?`<div class="blog-filters">
      <button class="blog-filter-btn${aktifLigFiltre==='hepsi'?' active':''}" onclick="filtrele('hepsi')">Tumu</button>
      ${ligler.map(l=>`<button class="blog-filter-btn${aktifLigFiltre===l?' active':''}" onclick="filtrele('${l.replace(/'/g,"\\'")}')">${escapeHtml(l)}</button>`).join('')}
    </div>`:''}
    <div class="blog-grid">
      ${yazilar.map(y=>{
        const tarih=new Date(y.created_at).toLocaleDateString('tr-TR',{day:'2-digit',month:'long',year:'numeric'});
        return `<article class="article-card" onclick="yaziGoster('${y.slug}')">
          <div class="article-meta">
            ${y.etiket?`<span class="article-tag ${tagClass(y.etiket)}">${escapeHtml(y.etiket)}</span>`:''}
            <span class="article-date">${tarih}</span>
            ${y.lig?`<span style="font-size:10px;color:var(--gold);font-weight:600">${escapeHtml(y.lig)}</span>`:''}
          </div>
          <h2>${escapeHtml(y.baslik)}</h2>
          <p>${escapeHtml(y.ozet||'')}</p>
        </article>`;
      }).join('')}
    </div>
    ${yazilar.length===0?'<div style="text-align:center;padding:40px;color:var(--muted)">Henuz yazi yok.</div>':''}`;
}

function filtrele(lig){
  aktifLigFiltre=lig;
  if(lig==='hepsi'){
    renderYaziListesi(tumYazilar);
  } else {
    renderYaziListesi(tumYazilar.filter(y=>y.lig===lig));
  }
}

async function yaziGoster(slug){
  // URL'yi guncelle
  history.pushState(null,'',`/blog.html?yazi=${slug}`);
  const c=document.getElementById('blogContainer');
  c.innerHTML='<div class="loading"><div class="spinner"></div>Yazi yukleniyor...</div>';
  try{
    const r=await fetch(`${SU}/rest/v1/blog_yazilar?slug=eq.${slug}&yayinda=eq.true&select=*`,{headers:{apikey:SK,Authorization:`Bearer ${SK}`}});
    const data=await r.json();
    if(!data||!data.length){
      c.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)"><div style="font-size:32px;margin-bottom:12px">404</div><div>Yazi bulunamadi.</div><br><a href="/blog.html" style="color:var(--blue-lt)">Blog\'a don</a></div>';
      return;
    }
    const y=data[0];
    const tarih=new Date(y.created_at).toLocaleDateString('tr-TR',{day:'2-digit',month:'long',year:'numeric'});
    // Document title guncelle
    document.title=`${y.baslik} — aiALYSIS Live Blog`;
    c.innerHTML=`<div class="blog-detail">
      <div class="blog-detail-back" onclick="blogListesineDon()">&#8592; Blog'a Don</div>
      <h1>${escapeHtml(y.baslik)}</h1>
      <div class="blog-detail-meta">
        ${y.etiket?`<span class="article-tag ${tagClass(y.etiket)}">${escapeHtml(y.etiket)}</span>`:''}
        <span class="article-date">${tarih}</span>
        ${y.lig?`<span style="font-size:11px;color:var(--gold);font-weight:600">${escapeHtml(y.lig)}</span>`:''}
      </div>
      <div class="blog-detail-body">${y.icerik||''}</div>
    </div>`;
  }catch(e){
    c.innerHTML=`<div style="text-align:center;padding:40px;color:var(--red)">Yazi yuklenemedi: ${e.message}</div>`;
  }
}

function blogListesineDon(){
  history.pushState(null,'','/blog.html');
  document.title='Blog — aiALYSIS Live | Futbol Analiz ve Tahmin Yazilari';
  renderYaziListesi(tumYazilar);
}

// Popstate (geri butonu)
window.addEventListener('popstate',function(){
  const params=new URLSearchParams(window.location.search);
  const slug=params.get('yazi');
  if(slug){yaziGoster(slug);}
  else{renderYaziListesi(tumYazilar);}
});

// Baslangic yuklemesi
(async function(){
  const c=document.getElementById('blogContainer');
  try{
    const r=await fetch(`${SU}/rest/v1/blog_yazilar?yayinda=eq.true&order=created_at.desc&select=baslik,ozet,slug,created_at,lig,etiket`,{headers:{apikey:SK,Authorization:`Bearer ${SK}`}});
    const data=await r.json();
    tumYazilar=data||[];

    // Fallback: Supabase'de yazi yoksa statik icerik goster
    if(!tumYazilar.length){
      tumYazilar=[
        {baslik:'AI ile Futbol Tahmin Nasil Yapilir?',ozet:'Yapay zeka destekli futbol tahmin sistemleri nasil calisir?',slug:'ai-futbol-tahmin',created_at:'2026-03-20',etiket:'Yapay Zeka',lig:''},
        {baslik:'Super Lig 2025-2026 Sezon Analizi',ozet:'Turkiye Super Lig\'de sezon ortasi degerlendirmesi.',slug:'super-lig-sezon-analizi',created_at:'2026-03-15',etiket:'Sezon Analizi',lig:'Super Lig'},
        {baslik:'Mac Istatistikleri Nasil Okunur?',ozet:'Futbol istatistiklerini anlamak icin temel kavramlar.',slug:'mac-istatistikleri-rehber',created_at:'2026-03-10',etiket:'Rehber',lig:''}
      ];
    }

    // URL'de slug varsa detay goster
    const params=new URLSearchParams(window.location.search);
    const slug=params.get('yazi');
    if(slug){yaziGoster(slug);}
    else{renderYaziListesi(tumYazilar);}
  }catch(e){
    c.innerHTML=`<div style="text-align:center;padding:40px;color:var(--red)">Blog yuklenemedi: ${e.message}</div>`;
  }
})();
</script>

</body>
