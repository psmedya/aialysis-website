<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aiALYSIS Live Widget</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0A0A12;color:#F0F0F5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;}
.widget{display:flex;flex-direction:column;height:100vh;max-height:400px;}
.header{background:#4A3AFF;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.header .logo{display:flex;align-items:baseline;gap:0;}
.header .ai{font-style:italic;font-size:14px;font-weight:300;color:#FFD54F;}
.header .alysis{font-size:14px;font-weight:900;color:#fff;letter-spacing:-0.5px;}
.header .live-badge{display:flex;align-items:center;gap:4px;background:rgba(46,213,115,.2);border:1px solid rgba(46,213,115,.5);border-radius:10px;padding:2px 8px;font-size:9px;font-weight:700;color:#2ED573;letter-spacing:0.5px;}
.header .dot{width:5px;height:5px;background:#2ED573;border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.matches{flex:1;overflow-y:auto;padding:4px 0;}
.match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:8px 12px;border-bottom:1px solid #1A1A2E;gap:6px;transition:background .15s;}
.match:hover{background:#12121E;}
.match:last-child{border-bottom:none;}
.league{grid-column:1/-1;font-size:9px;color:#7A7A95;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.team{font-size:12px;font-weight:500;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.team.home{text-align:right;}
.team.away{text-align:left;}
.score-box{display:flex;flex-direction:column;align-items:center;min-width:52px;}
.score{font-size:16px;font-weight:900;color:#fff;letter-spacing:1px;}
.minute{font-size:9px;font-weight:700;color:#2ED573;margin-top:1px;}
.minute.ht{color:#FFD32A;}
.minute.ft{color:#7A7A95;}
.empty{flex:1;display:flex;align-items:center;justify-content:center;color:#7A7A95;font-size:12px;padding:20px;text-align:center;}
.footer{background:#12121E;border-top:1px solid #2A2A3E;padding:6px 12px;text-align:center;flex-shrink:0;}
.footer a{color:#D4A24C;text-decoration:none;font-size:10px;font-weight:600;transition:color .2s;}
.footer a:hover{color:#FFD54F;}
.loading{flex:1;display:flex;align-items:center;justify-content:center;color:#7A7A95;font-size:12px;}
.spinner{width:18px;height:18px;border:2px solid #2A2A3E;border-top-color:#4A3AFF;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="logo"><span class="ai">ai</span><span class="alysis">ALYSIS</span></div>
    <div class="live-badge"><span class="dot"></span>CANLI</div>
  </div>
  <div id="content" class="loading">
    <div class="spinner"></div>Yükleniyor...
  </div>
  <div class="footer">
    <a href="https://aialysis.live" target="_blank" rel="noopener">aialysis.live — AI Futbol Analiz</a>
  </div>
</div>

<script>
const SU='https://fohmlwoewjupceznwmdr.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZvaG1sd29ld2p1cGNlem53bWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDE4MjYsImV4cCI6MjA4OTUxNzgyNn0.Ye-85hcsrLeORp-ThZCxssrc92WOm4ZI-B3mvTmwju4';

const LIG_ONCELIK={
  'Turkey Super Lig':20000,'Turkey Süper Lig':20000,
  'Champions League':18000,'Europa League':17900,'Conference League':17800,
  'Premier League':16000,'La Liga':15900,'Bundesliga':15800,
  'Serie A':15700,'Ligue 1':15600
};

function ligOncelik(name){
  for(const[k,v] of Object.entries(LIG_ONCELIK)){
    if(name&&name.includes(k))return v;
  }
  return 1000;
}

async function fetchLive(){
  try{
    const r=await fetch(`${SU}/functions/v1/api-proxy?path=${encodeURIComponent('/fixtures?live=all')}`,{
      headers:{'apikey':SK,'Authorization':`Bearer ${SK}`}
    });
    const d=await r.json();
    if(!d.response||!d.response.length){
      document.getElementById('content').innerHTML='<div class="empty">Şu anda canlı maç yok</div>';
      document.getElementById('content').className='matches';
      return;
    }
    const sorted=d.response.sort((a,b)=>{
      const pa=ligOncelik(a.league?.name||'');
      const pb=ligOncelik(b.league?.name||'');
      return pb-pa;
    });
    const top5=sorted.slice(0,5);
    let html='';
    for(const m of top5){
      const home=m.teams?.home?.name||'?';
      const away=m.teams?.away?.name||'?';
      const hg=m.goals?.home??'-';
      const ag=m.goals?.away??'-';
      const elapsed=m.fixture?.status?.elapsed||'';
      const short=m.fixture?.status?.short||'';
      const league=m.league?.name||'';
      let minClass='minute';
      let minText=elapsed+"'";
      if(short==='HT'){minText='Devre Arası';minClass='minute ht';}
      else if(short==='FT'||short==='AET'||short==='PEN'){minText='Bitti';minClass='minute ft';}
      else if(short==='BT'){minText='Ara';minClass='minute ht';}
      html+=`<div class="match">
        <div class="league">${league}</div>
        <div class="team home">${home}</div>
        <div class="score-box">
          <div class="score">${hg} - ${ag}</div>
          <div class="${minClass}">${minText}</div>
        </div>
        <div class="team away">${away}</div>
      </div>`;
    }
    const el=document.getElementById('content');
    el.className='matches';
    el.innerHTML=html;
  }catch(e){
    document.getElementById('content').innerHTML='<div class="empty">Bağlantı hatası</div>';
    document.getElementById('content').className='matches';
  }
}

fetchLive();
setInterval(fetchLive,60000);
</script>
</body>
</html>
